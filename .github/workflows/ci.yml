name: CI

# Quality gate — runs on every push and pull request. A red check blocks merge.
on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - name: unit tests
        run: npm test
      - name: build
        run: npm run build
      - name: verify (astro check ratchet + tests + build)
        run: npm run verify
