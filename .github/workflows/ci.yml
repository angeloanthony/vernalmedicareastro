name: CI

# Quality gate — runs on every push and pull request. A red check blocks merge.
on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24 # Astro 6 requires Node >=22.12.0 (package.json engines)
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run verify # astro check (ratcheted) → unit tests → build
